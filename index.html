<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nyzora — Creator-Designed Furniture Marketplace</title>
    <meta name="description" content="Discover one-of-a-kind furniture pieces crafted by talented designers worldwide. Sustainable, made-to-order furniture with perpetual designer commissions." />
    <meta name="author" content="Nyzora" />
    <meta property="og:title" content="Nyzora - Creator-Designed Furniture Marketplace" />
    <meta property="og:description" content="Every piece tells a story. Shop unique, sustainable furniture designed by creators and manufactured on-demand." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" data-dynamic-url />
    <meta property="og:site_name" content="Nyzora" />
    <meta property="og:image" content="https://nyzora.ai/og-default.png" />
    <script>
      (function () {
        var path = window.location.pathname.replace(/\/+$/, '') || '/';
        var params = new URLSearchParams(window.location.search);
        ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content', 'gclid', 'fbclid', 'ref', '__lovable_token'].forEach(function (key) { params.delete(key); });
        var query = params.toString();
        var canonicalUrl = 'https://nyzora.ai' + path + (query ? '?' + query : '');
        var canonical = document.querySelector('link[rel="canonical"]');
        if (!canonical) {
          canonical = document.createElement('link');
          canonical.setAttribute('rel', 'canonical');
          document.head.appendChild(canonical);
        }
        if (canonical) canonical.setAttribute('href', canonicalUrl);
        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl) ogUrl.setAttribute('content', canonicalUrl);
      })();
    </script>

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://nyzora.ai/og-default.png" />

    <!-- Organization schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Nyzora",
      "url": "https://nyzora.ai",
      "logo": "https://nyzora.ai/favicon.png",
      "description": "AI-powered marketplace for creator-designed, made-to-order furniture and home objects.",
      "email": "contact@nyzora.ai",
      "telephone": "+91-90825-82002",
      "sameAs": []
    }
    </script>

    <!-- WebSite schema with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Nyzora",
      "url": "https://nyzora.ai",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://nyzora.ai/browse?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
